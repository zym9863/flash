<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美颜补光灯</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title"><i class="fas fa-magic"></i> 美颜补光灯 <i class="fas fa-star"></i></h1>
            <div class="subtitle">✨ 一键点亮你的盛世美颜 ✨</div>
        </header>
        
        <main>
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <h2>滤镜设置</h2>
                    <div class="filter-options">
                        <div class="filter-option">
                            <label for="brightness">亮度：</label>
                            <input type="range" id="brightness" min="0" max="200" value="100">
                            <span id="brightness-value">100%</span>
                        </div>
                        
                        <div class="filter-option">
                            <label for="saturation">饱和度：</label>
                            <input type="range" id="saturation" min="0" max="200" value="100">
                            <span id="saturation-value">100%</span>
                        </div>
                        
                        <div class="filter-option">
                            <label for="hue-rotate">色相：</label>
                            <input type="range" id="hue-rotate" min="0" max="360" value="0">
                            <span id="hue-rotate-value">0°</span>
                        </div>
                    </div>
                    
                    <div class="filter-presets">
                        <h3>滤镜风格</h3>
                        <div class="preset-buttons">
                            <button class="preset" data-preset="normal"><i class="fas fa-sun"></i> 正常</button>
                            <button class="preset" data-preset="warm"><i class="fas fa-fire"></i> 暖色</button>
                            <button class="preset" data-preset="cool"><i class="fas fa-snowflake"></i> 冷色</button>
                            <button class="preset" data-preset="vintage"><i class="fas fa-camera-retro"></i> 复古</button>
                            <button class="preset" data-preset="dramatic"><i class="fas fa-theater-masks"></i> 戏剧</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p><i class="fas fa-heart"></i> 光影魔法 | 你的专属美颜补光神器  <i class="fas fa-camera"></i></p>
            <div class="footer-credits">用爱设计 &copy; 2025</div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
